<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BlueTex Roll-Up Garage Door Material Calculator</title>
    <meta name="description" content="Calculate roll-up garage door insulation linear footage, kit size, and double-sided tape strip guidance for BlueTex kits.">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="wrap">
      <header class="calc-header">
        <div>
          <p class="brand-kicker">BlueTex Insulation</p>
          <h1>Garage Door Material Calculator</h1>
          <p class="subtitle">Roll-Up Door Kits · Material + Tape Plan</p>
        </div>
        <button class="icon-button" type="button" data-mode-toggle aria-label="Toggle embed view" aria-pressed="false" title="Embed view">
          <i class="ti ti-arrows-minimize"></i>
        </button>
      </header>

      <main aria-label="BlueTex roll-up garage door material calculator">
        <section class="sec">
          <div class="sec-head">
            <div class="snum">1</div>
            <p class="stitle">Garage Door Sizes</p>
          </div>

          <form data-calculator-form>
            <div class="door-grid-labels" aria-hidden="true">
              <span>Door Width (ft)</span>
              <span>Door Height (ft)</span>
              <span>Qty</span>
            </div>
            <div data-rows></div>

            <div class="input-actions">
              <button class="secondary-button" type="button" data-add-row>
                <i class="ti ti-plus"></i>
                <span>Add Another Size</span>
              </button>
              <button class="primary-button" type="button" data-calc-scroll>
                Calculate Materials
              </button>
            </div>
          </form>
        </section>

        <div data-results>
          <div class="summary-grid" data-summary></div>
          <div class="details-stack" data-details></div>
        </div>
      </main>

      <footer class="site-footer">
        <span>Need help checking an unusual door setup?</span>
        <a href="tel:18005958772">1-800-595-8772</a>
        <a href="https://bluetexinsulation.com/pages/contact-us">Contact BlueTex</a>
      </footer>
    </div>

    <script type="module" src="src/app.js"></script>
  </body>
</html>
